# Decision Intelligence Co-Pilot — nginx config
# Replace YOUR_DOMAIN with your actual domain before running certbot.
# certbot will automatically add the SSL server block when ready.

server {
    listen 80;
    server_name YOUR_DOMAIN;

    # Timeouts long enough for multi-agent LLM calls
    proxy_read_timeout    180s;
    proxy_connect_timeout 180s;
    proxy_send_timeout    180s;

    location / {
        proxy_pass http://127.0.0.1:8501;
        proxy_http_version 1.1;

        # WebSocket support — required for st.write_stream() streaming
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Standard proxy headers
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Disable buffering so tokens stream to the browser immediately
        proxy_buffering off;
    }
}
